services:
  postgres:
    image: postgres:16-alpine
    container_name: course_inventory_postgres
    environment:
      POSTGRES_DB: course_inventory
      POSTGRES_USER: course_inventory
      POSTGRES_PASSWORD: course_inventory
    ports:
      - "5433:5432"
    volumes:
      - course_inventory_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U course_inventory -d course_inventory"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  course_inventory_pgdata:
